[package]
name = "lp_i18n"
version = "1.3.0"
edition = "2024"
license = "MIT"
authors = ["2high4schooltoday"]
description = "Standalone Rosetta localization engine for Rust and native language bindings."

[lib]
crate-type = ["rlib", "cdylib", "staticlib"]

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
insta = { version = "1.43", features = ["yaml"] }
