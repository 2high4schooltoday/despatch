name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_url: ${{ steps.release.outputs.release_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" --json id,url >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --title "${GITHUB_REF_NAME}" \
              --verify-tag
          fi
          echo "release_id=$(gh release view "${GITHUB_REF_NAME}" --json id --jq '.id')" >> "$GITHUB_OUTPUT"
          echo "release_url=$(gh release view "${GITHUB_REF_NAME}" --json url --jq '.url')" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Install Rust cross-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run tests
        run: |
          set -euo pipefail
          go test ./...
          cargo test --manifest-path rust/Cargo.toml --workspace
          ./scripts/check_warm_palette.sh
          ./scripts/check_ui_contract.sh
          ./scripts/check_ui_selector_contract.sh
          ./scripts/check_surface_depth.sh
          ./scripts/check_no_native_dialogs.sh
          ./scripts/check_no_runtime_artifacts.sh

      - name: Rust dependency audit
        run: |
          set -euo pipefail
          cargo install --locked cargo-audit cargo-deny
          (
            cd rust
            cargo audit --ignore RUSTSEC-2023-0071
            cargo deny check --config deny.toml advisories bans sources
          )

      - name: Build release archives
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${UPDATE_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "UPDATE_SIGNING_PRIVATE_KEY secret is required for release signing" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SOURCE_REPO="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          mkdir -p dist
          for ARCH in amd64 arm64; do
            PKG_DIR="dist/pkg-${ARCH}"
            mkdir -p "${PKG_DIR}"
            case "${ARCH}" in
              amd64) RUST_TARGET="x86_64-unknown-linux-gnu" ;;
              arm64) RUST_TARGET="aarch64-unknown-linux-gnu" ;;
              *) echo "Unsupported ARCH=${ARCH}" >&2; exit 1 ;;
            esac
            LDFLAGS="-X 'despatch/internal/version.Version=${VERSION}' -X 'despatch/internal/version.Commit=${COMMIT}' -X 'despatch/internal/version.BuildTime=${BUILD_TIME}' -X 'despatch/internal/version.SourceRepo=${SOURCE_REPO}'"
            GOOS=linux GOARCH="${ARCH}" go build -ldflags "${LDFLAGS}" -o "${PKG_DIR}/despatch" ./cmd/server
            (
              cd rust
              export DESPATCH_BUILD_VERSION="${VERSION}"
              export DESPATCH_BUILD_COMMIT="${COMMIT}"
              export DESPATCH_BUILD_TIME="${BUILD_TIME}"
              if [[ "${RUST_TARGET}" == "aarch64-unknown-linux-gnu" ]]; then
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              cargo build --release --target "${RUST_TARGET}" -p pam_reset_helper -p update_worker -p mailsec_service
            )
            (
              cd third_party/launchpad-rosetta
              if [[ "${RUST_TARGET}" == "aarch64-unknown-linux-gnu" ]]; then
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              cargo build --release --target "${RUST_TARGET}"
            )
            cp "rust/target/${RUST_TARGET}/release/pam_reset_helper" "${PKG_DIR}/despatch-pam-reset-helper"
            cp "rust/target/${RUST_TARGET}/release/update_worker" "${PKG_DIR}/despatch-update-worker"
            cp "rust/target/${RUST_TARGET}/release/mailsec_service" "${PKG_DIR}/despatch-mailsec-service"
            cp "third_party/launchpad-rosetta/target/${RUST_TARGET}/release/liblp_i18n.so" "${PKG_DIR}/liblp_i18n.so"
            cp -R web "${PKG_DIR}/web"
            cp -R migrations "${PKG_DIR}/migrations"
            cp -R deploy "${PKG_DIR}/deploy"
            tar -C "${PKG_DIR}" -czf "dist/despatch-linux-${ARCH}.tar.gz" despatch despatch-pam-reset-helper despatch-update-worker despatch-mailsec-service liblp_i18n.so web migrations deploy
          done
          (
            cd dist
            sha256sum despatch-linux-amd64.tar.gz despatch-linux-arm64.tar.gz > checksums.txt
            printf '%s\n' "${UPDATE_SIGNING_PRIVATE_KEY}" > update-signing-key.pem
            chmod 600 update-signing-key.pem
            openssl pkey -in update-signing-key.pem -pubout -out update-signing-key.pub.pem
            openssl pkeyutl -sign -inkey update-signing-key.pem -rawin -in checksums.txt -out checksums.txt.sig
            openssl pkeyutl -verify -pubin -inkey update-signing-key.pub.pem -rawin -in checksums.txt -sigfile checksums.txt.sig
            rm -f update-signing-key.pem update-signing-key.pub.pem
          )

      - name: Attest amd64 release archive provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/despatch-linux-amd64.tar.gz

      - name: Attest arm64 release archive provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/despatch-linux-arm64.tar.gz

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/despatch-linux-amd64.tar.gz
            dist/despatch-linux-arm64.tar.gz
            dist/checksums.txt
            dist/checksums.txt.sig
          generate_release_notes: true

      - name: Apply checked-in release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "${NOTES_FILE}" ]; then
            exit 0
          fi
          TITLE="$(sed -n '1s/^# //p' "${NOTES_FILE}")"
          if [ -z "${TITLE}" ]; then
            TITLE="${GITHUB_REF_NAME}"
          fi
          gh release edit "${GITHUB_REF_NAME}" \
            --title "${TITLE}" \
            --notes-file "${NOTES_FILE}"

  package-installers:
    needs:
      - prepare-release
      - build-and-publish
    permissions:
      contents: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/launchpad-installer.yml
    with:
      project_path: packaging/despatch-installer
      output_dir: dist/installers
      artifact_name: despatch-launchpad-installers
      provenance_provider: github
      release_tag: ${{ github.ref_name }}
      release_id: ${{ needs.prepare-release.outputs.release_id }}
      release_url: ${{ needs.prepare-release.outputs.release_url }}
    secrets: inherit
