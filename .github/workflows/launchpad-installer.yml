name: Launchpad Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-installers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Launchpad CLI
        run: |
          set -euo pipefail
          cargo install --locked --git https://github.com/2high4schooltoday/Launchpad --tag v1.1.1 launchpad-cli

      - name: Validate Launchpad project
        run: |
          set -euo pipefail
          launchpad check ./packaging/despatch-installer
          launchpad run ./packaging/despatch-installer \
            --operation install \
            --yes \
            --dry-run \
            --set release=latest \
            --set baseDomain=mail.example.com \
            --set listenAddr=:8080 \
            --set installService=true \
            --set proxyServer=nginx \
            --set dovecotAuthMode=pam \
            --set dovecotAuthDbDriver=mysql \
            --set dovecotAuthDbDsn=unused \
            --set autoInstallDeps=false \
            --set ufwEnable=false \
            --set ufwOpenProxyPorts=false \
            --set ufwOpenDirectPort=false \
            --set enableCapCaptcha=false \
            --set capSiteKey=cap-site-key \
            --set capUpstream=127.0.0.1:8077 \
            --set capAutoProvision=false \
            --set capImage=tiagozip/cap:latest \
            --set capWidgetVersion=0.0.6 \
            --set capWasmVersion=0.0.6 \
            --set proxyServerName=mail.example.com \
            --set deployMode=proxy \
            --set proxyTls=true \
            --set proxyCert=/tmp/despatch-fullchain.pem \
            --set proxyKey=/tmp/despatch-privkey.pem \
            --set runDiagnose=false

      - name: Build standalone installers
        run: |
          set -euo pipefail
          mkdir -p dist/installers
          launchpad build-installer ./packaging/despatch-installer ./dist/installers

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: despatch-launchpad-installers
          path: dist/installers/*

      - name: Attach release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installers/*
