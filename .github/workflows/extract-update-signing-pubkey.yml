name: Extract Update Signing Public Key

on:
  workflow_dispatch:

jobs:
  derive:
    runs-on: ubuntu-latest
    steps:
      - name: Derive Public Key
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${UPDATE_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "UPDATE_SIGNING_PRIVATE_KEY is not configured" >&2
            exit 1
          fi
          printf '%s\n' "${UPDATE_SIGNING_PRIVATE_KEY}" > update-signing-key.pem
          chmod 600 update-signing-key.pem
          PUBLIC_KEY_B64="$(openssl pkey -in update-signing-key.pem -pubout -outform DER | tail -c 32 | base64 | tr -d '\n')"
          rm -f update-signing-key.pem
          if [[ -z "${PUBLIC_KEY_B64}" ]]; then
            echo "failed to derive public key" >&2
            exit 1
          fi
          echo "UPDATE_SIGNING_PUBLIC_KEY=${PUBLIC_KEY_B64}"
